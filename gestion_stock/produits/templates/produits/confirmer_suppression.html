{% extends 'base.html' %}

{% block title %}Supprimer Produit{% endblock %}

{% block content %}
<div class="card shadow p-4">
    <h1 class="text-danger">Supprimer Produit</h1>
    <p>Tu veux vraiment supprimer <strong>{{ produit.nom }}</strong> ?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Oui, supprimer</button>
        <a href="{% url 'liste_produits' %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
